<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>左邓粉丝 · 银河综艺馆 · 同担座位互助</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#050505;--panel:#111;--panel2:#171717;--line:#2a2a2a;--text:#f4f4f4;--muted:#9b9b9b;--red:#e5484d;--green:#9bd7c0;--gold:#d8c38a}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.55 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}.app{min-height:100vh;display:grid;grid-template-columns:280px 1fr}.side{border-right:1px solid var(--line);padding:28px;background:#090909;position:sticky;top:0;height:100vh}.logo{width:44px;height:44px;border:1px solid var(--line);display:grid;place-items:center;border-radius:8px;color:var(--green);font-weight:800}.brand{display:flex;gap:12px;align-items:center}.brand h1{font-size:19px;margin:0}.muted{color:var(--muted);font-size:13px}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;padding:26px 32px;border-bottom:1px solid var(--line)}.top h2{margin:0;font-size:24px}main{min-width:0}.wrap{padding:28px 32px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;margin-bottom:18px}.head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.head h3{margin:0;font-size:16px}.body{padding:18px}.form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.field{display:grid;gap:6px}.full{grid-column:1/-1}input,select,textarea,button{font:inherit}input,select,textarea{width:100%;background:#0a0a0a;color:var(--text);border:1px solid var(--line);border-radius:7px;padding:10px}textarea{min-height:74px;resize:vertical}.btn{border:1px solid #333;background:#f2f2f2;color:#050505;border-radius:7px;padding:10px 14px;cursor:pointer}.btn.secondary{background:#111;color:#f2f2f2}.btn.danger{background:#301113;color:#fff;border-color:#6d2529}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tabs button{background:#111;color:#ddd;border:1px solid var(--line);border-radius:999px;padding:8px 12px}.tabs .active{background:#f2f2f2;color:#050505}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px}.row{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);margin-bottom:10px}.row.danger{border-color:#62252a;background:#1b0f10}.status{padding:14px;border:1px solid var(--line);border-radius:8px;background:#0c0c0c;margin-bottom:10px}.seats,.admin-seats{display:grid;grid-template-columns:repeat(auto-fill,14px);gap:5px;margin-bottom:10px}.seat{width:14px;height:14px;border-radius:3px;background:#242424;border:1px solid #333}.seat.taken{background:var(--red);border-color:#ff777a}.seat.mine{background:var(--green);border-color:#d2ffef}.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}.proofs{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:10px}.proof{border:1px solid var(--line);border-radius:8px;padding:10px;background:#0b0b0b}.proof img{width:100%;max-height:150px;object-fit:cover;border-radius:6px}.mini{display:flex;gap:8px;flex-wrap:wrap}.mini input,.mini select{width:110px}.hide{display:none}@media(max-width:850px){.app{display:block}.side{height:auto;position:static}.grid,.form{grid-template-columns:1fr}.top{padding:20px}.wrap{padding:18px}.row{grid-template-columns:1fr}.full{grid-column:auto}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side"><div class="brand"><div class="logo">CP</div><div><h1>同担座位互助</h1><p class="muted">静态版 v3 · 数据存在 Supabase</p></div></div><p class="muted">未审核不显示座位图；用户只看附近同担；管理员看全局。</p></aside>
  <main><header class="top"><div><h2>左邓粉丝 · 银河综艺馆 · 同担座位互助</h2><p class="muted">由左邓粉丝研发，仅限左邓粉丝使用。</p></div><button id="logoutBtn" class="btn secondary hide">退出</button></header><div id="app" class="wrap"><section class="panel"><div class="head"><h3>正在加载登录入口</h3></div><div class="body"><div class="status">如果这里一直不变，请截图发给我。</div></div></section></div></main>
</div>
<script>
window.addEventListener('error', function(event){ var el=document.getElementById('app'); if(el) el.innerHTML='<section class="panel"><div class="head"><h3>页面脚本报错</h3></div><div class="body"><div class="status">'+String(event.message||'未知错误')+'</div></div></section>'; });
window.addEventListener('unhandledrejection', function(event){ var el=document.getElementById('app'); var msg=event.reason&&event.reason.message?event.reason.message:event.reason; if(el) el.innerHTML='<section class="panel"><div class="head"><h3>加载失败</h3></div><div class="body"><div class="status">'+String(msg||'未知错误')+'</div></div></section>'; });
const SUPABASE_URL = 'https://whusghlbepizbkhhddlb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodXNnaGxiZXBpemJraGhkZGxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0OTQ4MDksImV4cCI6MjA5ODA3MDgwOX0.X-GfbDkrTSHUd3lbiYcQru3av5YWXdm7dzTPgbflQCA';
if (!window.supabase) { throw new Error('Supabase 脚本没有加载成功，请刷新或检查网络'); }
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const state = { token: localStorage.getItem('zd_token') || '', user: null, fields: [], zones: [], users: [], submissions: [], tab: 'login', adminTab: 'audit', selectedZone: '101区' };
const app = document.getElementById('app');
const logoutBtn = document.getElementById('logoutBtn');
const esc = (v) => String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function rpc(name, args={}){ const {data,error}=await client.rpc(name,args); if(error) throw new Error(error.message); return data; }
async function boot(){ try{ state.fields = await rpc('zd_proof_fields'); state.zones = await rpc('zd_zones'); if(state.token){ state.user = await rpc('zd_me',{p_token:state.token}); if(!state.user) localStorage.removeItem('zd_token'); } render(); }catch(e){ app.innerHTML='<div class="status">加载失败：'+esc(e.message)+'</div>'; }}
function setUser(token,user){ state.token=token; state.user=user; if(token)localStorage.setItem('zd_token',token); render(); }
logoutBtn.onclick=async()=>{ if(state.token) await rpc('zd_logout',{p_token:state.token}).catch(()=>{}); localStorage.removeItem('zd_token'); state.token=''; state.user=null; render(); };
function render(){ logoutBtn.classList.toggle('hide',!state.user); if(!state.user) return renderAuth(); if(['needs_proof','rejected'].includes(state.user.status)) return renderProof(); if(state.user.status==='pending') return html('<section class="panel"><div class="body"><div class="status"><b>等待管理员审核</b><p class="muted">审核通过前不会显示座位图、人数、红点或同担信息。</p></div></div></section>'); if(state.user.role==='admin') return renderAdmin(); return renderUser(); }
function html(s){ app.innerHTML=s; }
function renderAuth(){ html('<section class="panel"><div class="head"><h3>'+(state.tab==='register'?'注册证号':'登录')+'</h3></div><div class="body"><div class="tabs"><button id="loginTab" class="'+(state.tab==='login'?'active':'')+'">登录</button><button id="regTab" class="'+(state.tab==='register'?'active':'')+'">注册证号</button></div><div class="form"><label class="field full">账号 / 证号<input id="account"></label><label class="field full">密码<input id="password" type="password"></label>'+(state.tab==='register'?'<label class="field full">确认密码<input id="password2" type="password"></label>':'')+'<button id="authGo" class="btn full">'+(state.tab==='register'?'注册':'登录')+'</button><p class="muted full">如果忘记密码，请联系小管注销旧账号，再注册新的。</p></div></div></section>'); document.getElementById('loginTab').onclick=()=>{state.tab='login';render()}; document.getElementById('regTab').onclick=()=>{state.tab='register';render()}; document.getElementById('authGo').onclick=authGo; }
async function authGo(){ const account=document.getElementById('account').value.trim(); const password=document.getElementById('password').value; try{ if(state.tab==='register'){ if(password!==document.getElementById('password2').value) return alert('两次密码不一致'); const res=await rpc('zd_register',{p_account:account,p_password:password}); alert('注册成功\n\n你的账号是：'+account+'\n密码是：'+password+'\n\n请截图避免遗忘。'); setUser(res.token,res.user); }else{ const res=await rpc('zd_login',{p_account:account,p_password:password}); setUser(res.token,res.user); }}catch(e){alert(e.message)} }
function renderProof(){ const fields=state.fields.map(f=>proofInput(f)).join(''); html('<section class="panel"><div class="head"><h3>上传自证</h3></div><div class="body"><form id="proofForm" class="form">'+(state.user.rejectReason?'<div class="status full"><b>打回原因</b><p>'+esc(state.user.rejectReason)+'</p></div>':'')+'<label class="field">微博名<input name="weiboName" value="'+esc(state.user.weiboName)+'" required></label><label class="field">微信名<input name="wechatName" value="'+esc(state.user.wechatName)+'" required></label><label class="field full">是否在线下群<select name="offlineGroup" required><option value="">请选择</option><option '+(state.user.offlineGroup==='是'?'selected':'')+'>是</option><option '+(state.user.offlineGroup==='否'?'selected':'')+'>否</option></select></label>'+fields+'<button class="btn full">提交审核</button></form></div></section>'); document.getElementById('proofForm').onsubmit=submitProof; }
function proofInput(f){ if(['微博名','微信名','是否在线下群'].includes(f.label)) return ''; if(f.type==='image') return '<label class="field full">'+esc(f.label)+'<input name="'+f.id+'" type="file" accept="image/*" required></label>'; if(f.type==='text') return '<label class="field full">'+esc(f.label)+'<input name="'+f.id+'" required></label>'; if(f.type==='radio') return '<label class="field full">'+esc(f.label)+'<select name="'+f.id+'" required><option value="">请选择</option>'+(f.options||[]).map(o=>'<option>'+esc(o)+'</option>').join('')+'</select></label>'; return '<div class="field full"><span>'+esc(f.label)+'</span>'+(f.options||[]).map(o=>'<label><input type="checkbox" name="'+f.id+'" value="'+esc(o)+'"> '+esc(o)+'</label>').join('')+'</div>'; }
async function submitProof(ev){ ev.preventDefault(); const fd=new FormData(ev.target); const answers=[]; try{ for(const f of state.fields){ if(['微博名','微信名','是否在线下群'].includes(f.label)) continue; if(f.type==='image'){ const file=fd.get(f.id); if(!file||!file.name) throw new Error('自证项还没填完：'+f.label); const path=state.user.id+'/'+f.id+'-'+Date.now()+'-'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_'); const up=await client.storage.from('proof-files').upload(path,file,{upsert:false}); if(up.error) throw new Error(up.error.message); const pub=client.storage.from('proof-files').getPublicUrl(path).data.publicUrl; answers.push({fieldId:f.id,fileUrl:pub}); } else if(f.type==='checkbox'){ const vals=fd.getAll(f.id); if(!vals.length) throw new Error('自证项还没填完：'+f.label); answers.push({fieldId:f.id,valueJson:vals}); } else { const v=String(fd.get(f.id)||'').trim(); if(!v) throw new Error('自证项还没填完：'+f.label); answers.push({fieldId:f.id,valueText:v}); }} const user=await rpc('zd_submit_proof',{p_token:state.token,p_weibo:fd.get('weiboName'),p_wechat:fd.get('wechatName'),p_offline:fd.get('offlineGroup')==='是',p_answers:answers}); state.user=user; alert('已提交，等待管理员审核'); render(); }catch(e){alert(e.message)} }
function zoneOptions(){return state.zones.map(z=>'<option value="'+esc(z.zone)+'">'+esc(z.zone)+'</option>').join('')}
function renderUser(){ html('<div class="grid"><section class="panel"><div class="head"><h3>附近座位窗口</h3><span class="muted">前后 5 排、左右 10 号</span></div><div class="body" id="nearBox">正在加载...</div></section><section class="panel"><div class="head"><h3>我的互助信息</h3></div><div class="body"><div class="status"><b>'+esc(state.user.weiboName)+'</b><p>'+(state.user.seat?'我的座位：'+seatText(state.user.seat):'还没有登记座位')+'</p><label class="field">我的附近留言<textarea id="note">'+esc(state.user.fanNote)+'</textarea></label><button id="saveNote" class="btn secondary">保存留言</button></div><div class="tabs"><button id="seatTab" class="active">修改座位</button></div><div class="form"><label class="field">区<select id="seatZone">'+zoneOptions()+'</select></label><label class="field">排<input id="seatRow" type="number" value="'+(state.user.seat?.row||1)+'"></label><label class="field">号<input id="seatNo" type="number" value="'+(state.user.seat?.no||1)+'"></label><button id="saveSeat" class="btn full">保存座位</button></div></div></section></div>'); if(state.user.seat) document.getElementById('seatZone').value=state.user.seat.zone; document.getElementById('saveSeat').onclick=saveSeat; document.getElementById('saveNote').onclick=saveNote; loadNearby(); }
function seatText(s){return s.zone+'-'+s.row+'排-'+s.no+'号'}
async function saveSeat(){ try{ const user=await rpc('zd_save_seat',{p_token:state.token,p_zone:document.getElementById('seatZone').value,p_row:+document.getElementById('seatRow').value,p_no:+document.getElementById('seatNo').value,p_message:document.getElementById('note').value}); state.user=user; alert('座位已保存'); render(); }catch(e){alert(e.message)} }
async function saveNote(){ try{ const user=await rpc('zd_save_note',{p_token:state.token,p_note:document.getElementById('note').value}); state.user=user; alert('留言已保存'); render(); }catch(e){alert(e.message)} }
async function loadNearby(){ try{ const data=await rpc('zd_nearby',{p_token:state.token}); if(!data.seat) return document.getElementById('nearBox').innerHTML='<div class="status">先登记座位后，才会显示附近同担。</div>'; const people=data.nearby||[]; document.getElementById('nearBox').innerHTML=people.length?people.map(p=>'<div class="row"><div><b>'+esc(p.weiboName)+'</b><small class="muted"> '+seatText(p.seat)+'</small><p>'+esc(p.fanNote||'目前暂无留言')+'</p></div><small>微信名：'+esc(p.wechatName)+'<br>线下群：'+esc(p.offlineGroup)+'</small></div>').join(''):'<div class="status">目前暂无</div>'; }catch(e){document.getElementById('nearBox').innerHTML='<div class="status">'+esc(e.message)+'</div>'} }
async function renderAdmin(){ html('<section class="panel"><div class="head"><h3>管理后台</h3></div><div class="body"><div class="tabs">'+['audit:用户审核','users:用户管理','stats:统计','seatmap:座位示意图','config:场馆配置','proof:自证配置'].map(x=>{let [v,l]=x.split(':');return '<button data-tab="'+v+'" class="'+(state.adminTab===v?'active':'')+'">'+l+'</button>'}).join('')+'</div><div id="adminBody">加载中...</div></div></section>'); document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{state.adminTab=b.dataset.tab;renderAdmin()}); await loadAdmin(); }
async function loadAdmin(){ if(['audit','users'].includes(state.adminTab)){ const d=await rpc('zd_admin_users',{p_token:state.token}); state.users=d.users||[]; state.submissions=d.submissions||[]; return renderAdminUsers(); } if(state.adminTab==='stats') return renderStats(); if(state.adminTab==='seatmap') return renderSeatmap(); if(state.adminTab==='config') return renderConfig(); if(state.adminTab==='proof') return renderProofConfig(); }
function renderAdminUsers(){
  const list=state.users.filter(u=>state.adminTab==='users'||['pending','rejected'].includes(u.status));
  document.getElementById('adminBody').innerHTML=list.length?list.map(u=>'<div class="row '+(u.status==='rejected'?'danger':'')+'"><div><b>'+esc(u.account)+' · '+esc(u.weiboName||'未填微博名')+'</b><small class="muted"> '+esc(u.status)+' '+(u.seat?seatText(u.seat):'未登记')+'</small><p>微信名：'+esc(u.wechatName)+' · 线下群：'+esc(u.offlineGroup)+'</p>'+proofHtml(u.id)+'</div><div class="mini"><button class="btn" data-act="approve" data-id="'+esc(u.id)+'">通过</button><button class="btn danger" data-act="reject" data-id="'+esc(u.id)+'">打回</button><button class="btn secondary" data-act="seat" data-id="'+esc(u.id)+'">改座位</button><button class="btn danger" data-act="deactivate" data-id="'+esc(u.id)+'">注销</button></div></div>').join(''):'<div class="status">暂无数据</div>';
  document.querySelectorAll('[data-act]').forEach(btn=>btn.onclick=()=>{
    const id=btn.dataset.id;
    if(btn.dataset.act==='approve') adminStatus(id,'approved');
    if(btn.dataset.act==='reject') adminReject(id);
    if(btn.dataset.act==='seat') adminSeat(id);
    if(btn.dataset.act==='deactivate') adminStatus(id,'deactivated');
  });
}
function proofHtml(uid){ const sub=state.submissions.find(s=>s.userId===uid); if(!sub) return '<p class="muted">暂无自证</p>'; return '<div class="proofs">'+state.fields.map(f=>{const v=sub.answers?.[f.id]; if(!v)return '<div class="proof">'+esc(f.label)+'：未提交</div>'; if(v.type==='image')return '<div class="proof"><img src="'+esc(v.url)+'"><span>'+esc(f.label)+'</span></div>'; return '<div class="proof">'+esc(f.label)+'：'+esc(Array.isArray(v)?v.join('、'):v)+'</div>';}).join('')+'</div>'; }
window.adminStatus=async(id,status)=>{ try{ await rpc('zd_admin_set_status',{p_token:state.token,p_user_id:id,p_status:status,p_reason:null}); renderAdmin(); }catch(e){alert(e.message)} };
window.adminReject=async(id)=>{ const r=prompt('请输入打回原因'); if(!r)return; try{ await rpc('zd_admin_set_status',{p_token:state.token,p_user_id:id,p_status:'rejected',p_reason:r}); renderAdmin(); }catch(e){alert(e.message)} };
window.adminSeat=async(id)=>{ const z=prompt('区名，如 310区'); if(!z)return; const r=+prompt('排'); const n=+prompt('号'); try{ await rpc('zd_admin_save_seat',{p_token:state.token,p_user_id:id,p_zone:z,p_row:r,p_no:n}); renderAdmin(); }catch(e){alert(e.message)} };
async function renderStats(){ const s=await rpc('zd_admin_stats',{p_token:state.token}); document.getElementById('adminBody').innerHTML='<div class="stat-grid">'+['totalUsers:总用户','approved:通过','pending:待审核','rejected:打回','deactivated:注销','seated:已登记'].map(x=>{let[k,l]=x.split(':');return '<div class="status">'+l+'<br><b>'+s[k]+'</b></div>'}).join('')+'</div>'+Object.entries(s.byZone||{}).map(([z,c])=>'<div class="row"><b>'+esc(z)+'</b><small>'+c+' 人</small></div>').join(''); }
async function renderSeatmap(){ const z=state.selectedZone; const d=await rpc('zd_admin_seatmap',{p_token:state.token,p_zone:z}); document.getElementById('adminBody').innerHTML='<label class="field">选择区域<select id="adminZone">'+zoneOptions()+'</select></label><div class="status"><b>'+esc(d.zone.zone)+' · 已登记 '+d.seats.length+' 人</b></div>'+d.zone.rowCounts.map((count,i)=>'<p class="muted">'+(i+1)+'排</p><div class="admin-seats">'+Array.from({length:count},(_,j)=>{const o=d.seats.find(s=>s.row===i+1&&s.no===j+1);return '<div class="seat '+(o?'taken':'')+'" title="'+esc(o?.weiboName||'')+'"></div>'}).join('')+'</div>').join(''); document.getElementById('adminZone').value=z; document.getElementById('adminZone').onchange=e=>{state.selectedZone=e.target.value;renderAdmin()}; }
function parseRows(v,rows,max){ const arr=String(v||'').split(/[,，s]+/).map(Number).filter(n=>n>0); return arr.length?arr:Array.from({length:+rows||1},()=>+max||1); }
function renderConfig(){
  document.getElementById('adminBody').innerHTML='<div class="row"><input id="newZone" placeholder="新增区名"><select id="newTier"><option>一层看台</option><option>二层看台</option><option>三层看台</option></select><input id="newRows" value="10"><input id="newMax" value="20"><input id="newCounts" placeholder="每排号数 14,14,16"><button class="btn" data-zone-act="save" data-old="">新增</button></div>'+state.zones.map(z=>'<div class="row"><input id="zone_'+esc(z.zone)+'" value="'+esc(z.zone)+'"><input id="tier_'+esc(z.zone)+'" value="'+esc(z.tier)+'"><input id="counts_'+esc(z.zone)+'" value="'+esc(z.rowCounts.join(','))+'"><button class="btn secondary" data-zone-act="save" data-old="'+esc(z.zone)+'">保存</button><button class="btn danger" data-zone-act="delete" data-old="'+esc(z.zone)+'">删除</button></div>').join('');
  document.querySelectorAll('[data-zone-act]').forEach(btn=>btn.onclick=()=>{
    if(btn.dataset.zoneAct==='save') saveZone(btn.dataset.old||'');
    if(btn.dataset.zoneAct==='delete') deleteZone(btn.dataset.old||'');
  });
}
window.saveZone=async(old)=>{ try{ let tier,zone,counts;if(old){zone=document.getElementById('zone_'+old).value;tier=document.getElementById('tier_'+old).value;counts=parseRows(document.getElementById('counts_'+old).value,1,1)}else{zone=document.getElementById('newZone').value;tier=document.getElementById('newTier').value;counts=parseRows(document.getElementById('newCounts').value,document.getElementById('newRows').value,document.getElementById('newMax').value)} await rpc('zd_admin_save_zone',{p_token:state.token,p_old_zone:old,p_tier:tier,p_zone:zone,p_row_counts:counts}); state.zones=await rpc('zd_zones'); renderAdmin(); }catch(e){alert(e.message)} };
window.deleteZone=async(z)=>{ if(!confirm('确定删除 '+z+' 吗？'))return; try{await rpc('zd_admin_delete_zone',{p_token:state.token,p_zone:z}); state.zones=await rpc('zd_zones'); renderAdmin();}catch(e){alert(e.message)}};
function renderProofConfig(){
  document.getElementById('adminBody').innerHTML='<div class="row"><input id="pfLabel" placeholder="新增项名称"><select id="pfType"><option value="image">图片上传</option><option value="text">填空</option><option value="radio">单选</option><option value="checkbox">多选</option></select><input id="pfOptions" placeholder="选项 是,否"><button class="btn" id="addFieldBtn">新增</button></div>'+state.fields.map(f=>'<div class="row"><b>'+esc(f.label)+'</b><small>'+esc(f.type)+'</small><button class="btn danger" data-field-id="'+esc(f.id)+'">删除</button></div>').join('');
  document.getElementById('addFieldBtn').onclick=addField;
  document.querySelectorAll('[data-field-id]').forEach(btn=>btn.onclick=()=>deleteField(btn.dataset.fieldId));
}
window.addField=async()=>{ try{ await rpc('zd_admin_add_proof_field',{p_token:state.token,p_label:document.getElementById('pfLabel').value,p_type:document.getElementById('pfType').value,p_options:document.getElementById('pfOptions').value.split(/[,，]/).map(s=>s.trim()).filter(Boolean)}); state.fields=await rpc('zd_proof_fields'); renderAdmin(); }catch(e){alert(e.message)} };
window.deleteField=async(id)=>{ try{ await rpc('zd_admin_delete_proof_field',{p_token:state.token,p_field_id:id}); state.fields=await rpc('zd_proof_fields'); renderAdmin(); }catch(e){alert(e.message)} };
boot();
</script>
</body>
